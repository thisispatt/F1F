<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fantasy F1 — Budget Projector</title>
<style>
  html, body { margin: 0; background: #0A0A0B; }
  #root { min-height: 100vh; }
  #err { display:none; color:#FF6B6B; background:#141417; font:12px/1.6 ui-monospace,monospace;
         padding:16px; margin:16px; border:1px solid #333; border-radius:8px; white-space:pre-wrap; }
</style>
<!-- Show any load/runtime error on screen instead of a blank page -->
<script>
  function showErr(msg) {
    var d = document.getElementById('err');
    if (!d) { d = document.createElement('pre'); d.id = 'err'; document.body.appendChild(d); }
    d.style.display = 'block';
    d.textContent += msg + '\n';
  }
  window.addEventListener('error', function (e) {
    showErr((e.message || e.error || e) + (e.filename ? ('\n  at ' + e.filename + ':' + e.lineno) : ''));
  });
</script>
<!-- React + Recharts + Babel from CDN (no build step needed) -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
<!-- Name any library that got blocked (most common cause of a blank page) -->
<script>
  window.addEventListener('DOMContentLoaded', function () {
    var miss = [];
    if (!window.React) miss.push('React');
    if (!window.ReactDOM) miss.push('ReactDOM');
    if (!window.Recharts) miss.push('Recharts');
    if (!window.Babel) miss.push('Babel');
    if (miss.length) showErr('These libraries failed to load: ' + miss.join(', ') +
      '\nUsually a network, firewall, or ad-blocker is blocking the CDN.');
  });
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const {
  LineChart, Line, XAxis, YAxis, Tooltip,
  ResponsiveContainer, ReferenceLine, CartesianGrid,
} = Recharts;

/* Fantasy F1 — Budget Projector
 * Rolling 3-race average-PPM pricing model (community reverse-engineered).
 * Blank projection cells shorten the horizon (4 cells filled = 4-race projection). */

const C = {
  bg: "#0A0A0B",
  border: "rgba(255,255,255,0.12)",
  borderHi: "rgba(255,255,255,0.24)",
  inset: "#141417",
  ink: "#F2F2EE",
  muted: "#8B8E88",
  faint: "#5C5F5A",
  lime: "#C2F03E",
  // performance gradient (F1 sectors): purple (best) -> red (worst)
  great: "#A689FF",    // purple · max rise (best)
  good: "#C2F03E",     // green  · mid rise
  poor: "#F4D63D",     // yellow · mid drop
  terrible: "#FF6B6B", // red    · max drop (worst)
  squareInk: "#0B0D07",
};

const CAT = {
  great: { label: "Great", color: C.great },
  good: { label: "Good", color: C.good },
  poor: { label: "Poor", color: C.poor },
  terrible: { label: "Terrible", color: C.terrible },
};

const DEFAULT_MODEL = {
  tGreat: 1.2,
  tGood: 0.9,
  tPoor: 0.6,
  capTier: 18.5,
  cheap: { great: 0.6, good: 0.3, poor: -0.3, terrible: -0.6 },
  exp: { great: 0.3, good: 0.15, poor: -0.15, terrible: -0.3 },
};

const fmtM = (n) => `$${n.toFixed(1)}M`;
const fmtSigned = (n) => `${n > 0 ? "+" : n < 0 ? "−" : ""}${Math.abs(n).toFixed(1)}`;
const num = (v, fallback = 0) => {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
};
const tint = (hex, a = 0.16) => {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
};

function categorize(avgPPM, m) {
  if (avgPPM >= m.tGreat) return "great";
  if (avgPPM >= m.tGood) return "good";
  if (avgPPM >= m.tPoor) return "poor";
  return "terrible";
}
function deltaFor(catKey, priceEntering, m) {
  const tier = priceEntering > m.capTier ? m.exp : m.cheap;
  return tier[catKey];
}

function App() {
  const [driver, setDriver] = useState("");
  const [price, setPrice] = useState("11.0");
  const [scorePrev, setScorePrev] = useState("18");
  const [scoreLast, setScoreLast] = useState("21");
  const [proj, setProj] = useState(["20", "20", "20", "20", "20"]);
  const [model, setModel] = useState(DEFAULT_MODEL);
  const [showModel, setShowModel] = useState(false);
  const [selectedRace, setSelectedRace] = useState(0);

  const p0 = num(price, 0);
  const sPrev = num(scorePrev, 0);
  const sLast = num(scoreLast, 0);

  const setProjAt = (i, v) => setProj((arr) => arr.map((x, idx) => (idx === i ? v : x)));

  const sim = useMemo(() => {
    const rows = new Array(5).fill(null);
    let history = [sPrev, sLast];
    let curPrice = p0;
    for (let i = 0; i < 5; i++) {
      const raw = (proj[i] ?? "").toString().trim();
      if (raw === "") continue;
      const projPts = num(raw, 0);
      const window3 = [...history.slice(-2), projPts];
      const avgPts = window3.reduce((a, b) => a + b, 0) / 3;
      const avgPPM = curPrice > 0 ? avgPts / curPrice : 0;
      const catKey = categorize(avgPPM, model);
      const delta = deltaFor(catKey, curPrice, model);
      const after = Math.max(0, +(curPrice + delta).toFixed(2));
      const priorSum = history.slice(-2).reduce((a, b) => a + b, 0);
      rows[i] = { race: i + 1, avgPPM, catKey, delta, before: curPrice, after, priorSum };
      history = window3;
      curPrice = after;
    }
    return rows;
  }, [p0, sPrev, sLast, proj, model]);

  const active = sim.filter(Boolean);
  const racesCount = active.length;
  const finalPrice = racesCount ? active[racesCount - 1].after : p0;
  const totalDelta = +(finalPrice - p0).toFixed(2);

  const selIdx = sim[selectedRace] ? selectedRace : sim.findIndex(Boolean);
  const sel = selIdx >= 0 ? sim[selIdx] : null;

  const scenarios = useMemo(() => {
    if (!sel) return [];
    const P = sel.before;
    const prior = sel.priorSum;
    const needAt = (T) => Math.ceil(3 * P * T - prior);
    const nG = needAt(model.tGreat);
    const nR = needAt(model.tGood);
    const nH = needAt(model.tPoor);
    const tier = P > model.capTier ? model.exp : model.cheap;
    const mk = (key, cond, delta) => ({ key, cond, delta, result: Math.max(0, +(P + delta).toFixed(2)) });
    return [
      mk("great", `≥ ${nG}`, tier.great),
      mk("good", `≥ ${nR}`, tier.good),
      mk("poor", `≥ ${nH}`, tier.poor),
      mk("terrible", `≤ ${nH - 1}`, tier.terrible),
    ];
  }, [sel, model]);

  const chartData = [
    { name: "Now", price: +p0.toFixed(1) },
    ...active.map((r) => ({ name: `R${r.race}`, price: +r.after.toFixed(1) })),
  ];

  return (
    <div style={S.page} className="ffp">
      <style>{CSS}</style>

      <header style={S.header}>
        <div style={S.eyebrow}><span style={S.dot} /> FANTASY F1 · PRICE MODEL</div>
        <h1 style={S.h1}>BUDGET PROJECTOR</h1>
      </header>

      <Card tab="DRIVER FORM">
        <Field label="Driver">
          <input style={S.input} value={driver} onChange={(e) => setDriver(e.target.value)} placeholder="e.g. Leclerc" />
        </Field>
        <div style={S.tripleRow}>
          <Field label="Current price ($M)">
            <input style={S.input} value={price} onChange={(e) => setPrice(e.target.value)} inputMode="decimal" />
          </Field>
          <Field label="Score · 2 races ago">
            <input style={S.input} value={scorePrev} onChange={(e) => setScorePrev(e.target.value)} inputMode="numeric" />
          </Field>
          <Field label="Score · last race">
            <input style={S.input} value={scoreLast} onChange={(e) => setScoreLast(e.target.value)} inputMode="numeric" />
          </Field>
        </div>
      </Card>

      <Card tab="PRICE SCENARIOS">
        <div style={S.scenarioHead}>
          <div style={S.cardTitle}>{sel ? `R${sel.race}` : "—"}{driver ? ` · ${driver.toUpperCase()}` : ""}</div>
          <div style={S.enteringTag}>{sel ? `entering ${fmtM(sel.before)}` : "no races projected"}</div>
        </div>
        <div style={S.squareRow}>
          {(scenarios.length ? scenarios : [{ key: "great" }, { key: "good" }, { key: "poor" }, { key: "terrible" }]).map((s) => (
            <div key={s.key} style={{ ...S.square, background: CAT[s.key].color }}>
              <span style={S.sqNum}>{s.cond || "—"}</span>
              {s.delta != null && <span style={S.sqDelta}>{fmtSigned(s.delta)}M → {fmtM(s.result)}</span>}
            </div>
          ))}
        </div>
      </Card>

      <Card tab="RACE PROJECTION">
        <div style={S.fillRow}>
          <span style={S.fillLabel}>Blank a cell to drop a race</span>
          <span style={S.horizon}>{racesCount}-RACE</span>
        </div>
        <div style={S.tower}>
          <div style={S.towerHead}>
            <span style={{ ...S.tc, flex: "0 0 46px" }}>RACE</span>
            <span style={{ ...S.tc, flex: "0 0 78px" }}>PROJ</span>
            <span style={{ ...S.tc, flex: 1 }}>AVG PPM</span>
            <span style={{ ...S.tc, flex: "0 0 80px" }}>RATING</span>
            <span style={{ ...S.tc, flex: "0 0 48px", textAlign: "right" }}>Δ</span>
            <span style={{ ...S.tc, flex: "0 0 72px", textAlign: "right" }}>PRICE</span>
          </div>
          {proj.map((pv, i) => {
            const r = sim[i];
            const isSel = i === selIdx && r;
            const blank = !r;
            return (
              <div
                key={i}
                onClick={() => setSelectedRace(i)}
                style={{
                  ...S.towerRow,
                  borderLeft: `3px solid ${blank ? "transparent" : CAT[r.catKey].color}`,
                  background: isSel ? C.inset : "transparent",
                  opacity: blank ? 0.5 : 1,
                  cursor: "pointer",
                }}
              >
                <span style={{ ...S.rc, flex: "0 0 46px", color: isSel ? C.lime : C.faint }}>
                  {isSel ? "▸" : ""}R{i + 1}
                </span>
                <span style={{ flex: "0 0 78px" }}>
                  <input
                    style={S.miniInput}
                    value={pv}
                    placeholder="—"
                    onChange={(e) => setProjAt(i, e.target.value)}
                    onClick={(e) => e.stopPropagation()}
                    onFocus={() => setSelectedRace(i)}
                    inputMode="numeric"
                  />
                </span>
                <span style={{ ...S.rc, flex: 1, color: blank ? C.faint : C.ink }}>
                  {blank ? "—" : r.avgPPM.toFixed(2)}
                </span>
                <span style={{ flex: "0 0 80px" }}>
                  {blank ? (
                    <span style={{ ...S.rc, color: C.faint }}>—</span>
                  ) : (
                    <span style={{ ...S.ratingChip, color: CAT[r.catKey].color, background: tint(CAT[r.catKey].color) }}>
                      {CAT[r.catKey].label}
                    </span>
                  )}
                </span>
                <span style={{ ...S.rc, flex: "0 0 48px", textAlign: "right", color: blank ? C.faint : r.delta > 0 ? C.lime : C.terrible }}>
                  {blank ? "—" : fmtSigned(r.delta)}
                </span>
                <span style={{ ...S.rc, flex: "0 0 72px", textAlign: "right", color: blank ? C.faint : C.ink }}>
                  {blank ? "—" : r.after.toFixed(1)}
                </span>
              </div>
            );
          })}
        </div>
      </Card>

      <Card tab="PROJECTED BUDGET" side="right">
        <BigStat label={`Price after ${racesCount} race${racesCount === 1 ? "" : "s"}`} value={fmtM(finalPrice)} />
        <BigStat
          label="Net budget change"
          value={`${totalDelta >= 0 ? "+" : "−"}$${Math.abs(totalDelta).toFixed(1)}M`}
          color={totalDelta > 0 ? C.lime : totalDelta < 0 ? C.terrible : C.ink}
          last
        />
      </Card>

      <Card tab="TRAJECTORY">
        <div style={{ width: "100%", height: 210 }}>
          <ResponsiveContainer>
            <LineChart data={chartData} margin={{ top: 14, right: 10, bottom: 0, left: -14 }}>
              <CartesianGrid stroke="rgba(255,255,255,0.07)" vertical={false} />
              <XAxis dataKey="name" stroke="rgba(255,255,255,0.1)" tick={{ fill: C.muted, fontSize: 12, fontFamily: "var(--mono)" }} tickLine={false} axisLine={{ stroke: "rgba(255,255,255,0.1)" }} />
              <YAxis stroke="rgba(255,255,255,0.1)" tick={{ fill: C.muted, fontSize: 12, fontFamily: "var(--mono)" }} tickLine={false} axisLine={false} width={44} domain={["dataMin - 1", "dataMax + 1"]} tickFormatter={(v) => `$${v}`} />
              <Tooltip contentStyle={{ background: C.inset, border: `1px solid ${C.border}`, borderRadius: 10, fontFamily: "var(--mono)", fontSize: 12, color: C.ink }} labelStyle={{ color: C.muted }} formatter={(v) => [`$${v}M`, "Price"]} />
              <ReferenceLine y={p0} stroke={C.faint} strokeDasharray="4 4" />
              <Line type="monotone" dataKey="price" stroke={C.lime} strokeWidth={2.5} dot={{ r: 4, fill: C.lime, strokeWidth: 0 }} activeDot={{ r: 6 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <Card tab="MODEL">
        <button style={S.modelToggle} onClick={() => setShowModel((s) => !s)}>
          {showModel ? "▾ HIDE" : "▸ SHOW"} THRESHOLDS &amp; DELTAS
        </button>
        {showModel && (
          <div style={S.modelBody}>
            <div style={S.modelGrid}>
              <Field label="Great ≥ avg PPM"><input style={S.input} value={model.tGreat} onChange={(e) => setModel({ ...model, tGreat: num(e.target.value, model.tGreat) })} inputMode="decimal" /></Field>
              <Field label="Good ≥ avg PPM"><input style={S.input} value={model.tGood} onChange={(e) => setModel({ ...model, tGood: num(e.target.value, model.tGood) })} inputMode="decimal" /></Field>
              <Field label="Poor ≥ avg PPM"><input style={S.input} value={model.tPoor} onChange={(e) => setModel({ ...model, tPoor: num(e.target.value, model.tPoor) })} inputMode="decimal" /></Field>
              <Field label="Cap tier ($M)"><input style={S.input} value={model.capTier} onChange={(e) => setModel({ ...model, capTier: num(e.target.value, model.capTier) })} inputMode="decimal" /></Field>
            </div>
            <div style={S.legend}>
              <span style={{ color: C.faint }}>≤ cap</span>
              <span style={{ color: C.great }}>Great +{model.cheap.great}</span>
              <span style={{ color: C.good }}>Good +{model.cheap.good}</span>
              <span style={{ color: C.poor }}>Poor {model.cheap.poor}</span>
              <span style={{ color: C.terrible }}>Terrible {model.cheap.terrible}</span>
            </div>
            <button style={S.resetBtn} onClick={() => setModel(DEFAULT_MODEL)}>RESET</button>
          </div>
        )}
      </Card>
    </div>
  );
}

function Card({ tab, side = "left", children }) {
  return (
    <div style={S.cardWrap}>
      <div style={{ ...S.tab, ...(side === "right" ? { right: 18 } : { left: 18 }) }}>
        <span style={S.tabDot} />
        <span style={S.tabLabel}>{tab}</span>
      </div>
      <div style={S.card}>{children}</div>
    </div>
  );
}
function Field({ label, children }) {
  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <label style={S.fieldLabel}>{label}</label>
      {children}
    </div>
  );
}
function BigStat({ label, value, color, last }) {
  return (
    <div style={{ marginBottom: last ? 0 : 18 }}>
      <div style={S.bigStatLabel}>{label}</div>
      <div style={{ ...S.bigStatValue, color: color || C.ink }}>{value}</div>
    </div>
  );
}

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
  :root { --pixel: 'Orbitron', sans-serif; --mono: 'Orbitron', sans-serif; }
  .ffp input::placeholder { color: ${C.faint}; }
  .ffp input:focus { outline: none; border-color: ${C.lime}; }
  .ffp button:hover { border-color: ${C.lime}; color: ${C.lime}; }
`;

const fieldLabel = {
  display: "block",
  fontFamily: "var(--mono)",
  fontSize: 10.5,
  fontWeight: 700,
  letterSpacing: "0.1em",
  textTransform: "uppercase",
  color: C.muted,
  marginBottom: 7,
};

const S = {
  page: { fontFamily: "var(--mono)", color: C.ink, minHeight: "100vh", padding: "32px 20px 44px", maxWidth: 720, margin: "0 auto", boxSizing: "border-box", background: C.bg },
  header: { marginBottom: 30 },
  eyebrow: { fontFamily: "var(--mono)", fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", color: C.muted, display: "flex", alignItems: "center", gap: 8 },
  dot: { width: 8, height: 8, borderRadius: "50%", background: C.lime, display: "inline-block" },
  h1: { fontFamily: "var(--pixel)", fontWeight: 800, fontSize: 33, letterSpacing: "0.01em", margin: "12px 0 0", lineHeight: 1.06, color: C.ink },
  cardWrap: { position: "relative", marginBottom: 26 },
  tab: { position: "absolute", top: -8, zIndex: 2, display: "flex", alignItems: "center", gap: 8, padding: "0 10px", background: C.bg },
  tabDot: { width: 7, height: 7, borderRadius: "50%", background: C.lime, display: "inline-block" },
  tabLabel: { fontFamily: "var(--pixel)", fontSize: 13, fontWeight: 600, letterSpacing: "0.08em", color: C.ink },
  card: { position: "relative", border: `1px solid ${C.border}`, borderRadius: 18, padding: "24px 20px 20px", background: "transparent" },
  tripleRow: { display: "flex", gap: 12, marginTop: 16 },
  fieldLabel,
  input: { width: "100%", background: C.inset, border: `1px solid ${C.border}`, borderRadius: 10, color: C.ink, fontFamily: "var(--mono)", fontSize: 15, fontWeight: 700, padding: "10px 12px", boxSizing: "border-box" },
  scenarioHead: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 10, marginBottom: 16 },
  cardTitle: { fontFamily: "var(--pixel)", fontSize: 22, fontWeight: 600, color: C.ink, letterSpacing: "0.02em" },
  enteringTag: { fontFamily: "var(--mono)", fontSize: 12, fontWeight: 700, color: C.muted, whiteSpace: "nowrap" },
  squareRow: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 },
  square: { aspectRatio: "1 / 1", borderRadius: 14, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8, padding: 8, textAlign: "center" },
  sqNum: { fontFamily: "var(--pixel)", fontSize: 22, fontWeight: 700, color: C.squareInk, lineHeight: 1 },
  sqDelta: { fontFamily: "var(--mono)", fontSize: 10.5, fontWeight: 700, color: C.squareInk, opacity: 0.78 },
  fillRow: { display: "flex", alignItems: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" },
  fillLabel: { fontFamily: "var(--mono)", fontSize: 10.5, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.muted },
  horizon: { marginLeft: "auto", fontFamily: "var(--pixel)", fontSize: 13, fontWeight: 600, color: C.lime, letterSpacing: "0.06em" },
  tower: { border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" },
  towerHead: { display: "flex", alignItems: "center", gap: 8, padding: "9px 12px", background: C.inset, borderBottom: `1px solid ${C.border}` },
  tc: { fontFamily: "var(--mono)", fontSize: 9.5, fontWeight: 700, letterSpacing: "0.1em", color: C.muted },
  towerRow: { display: "flex", alignItems: "center", gap: 8, padding: "9px 12px 9px 9px", borderBottom: `1px solid ${C.border}` },
  rc: { fontFamily: "var(--mono)", fontSize: 14, fontWeight: 700 },
  miniInput: { width: 56, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 7, color: C.ink, fontFamily: "var(--mono)", fontSize: 14, fontWeight: 700, padding: "5px 6px", boxSizing: "border-box", textAlign: "center" },
  ratingChip: { display: "inline-block", fontFamily: "var(--mono)", fontSize: 10.5, fontWeight: 700, borderRadius: 6, padding: "3px 8px", letterSpacing: "0.02em" },
  bigStatLabel: { fontFamily: "var(--mono)", fontSize: 10.5, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.muted },
  bigStatValue: { fontFamily: "var(--pixel)", fontSize: 46, fontWeight: 700, lineHeight: 1, marginTop: 8 },
  modelToggle: { width: "100%", textAlign: "left", fontFamily: "var(--pixel)", fontSize: 14, fontWeight: 500, letterSpacing: "0.04em", color: C.ink, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 10, padding: "11px 14px", cursor: "pointer" },
  modelBody: { marginTop: 16 },
  modelGrid: { display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 14, marginBottom: 16 },
  legend: { display: "flex", gap: 14, flexWrap: "wrap", fontFamily: "var(--mono)", fontSize: 12, fontWeight: 700, marginBottom: 14 },
  resetBtn: { fontFamily: "var(--pixel)", fontSize: 13, fontWeight: 500, color: C.muted, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 14px", cursor: "pointer", letterSpacing: "0.04em" },
};

try {
  if (typeof Recharts === "undefined") throw new Error("Recharts failed to load from the CDN (check network / ad blocker).");
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  showErr(String(e && e.stack ? e.stack : e));
}
</script>
</body>
</html>
